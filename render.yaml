services:
  - type: web
    name: icross-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 24h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: UPLOAD_DIR
        value: ./uploads
      - key: CORS_ORIGINS
        value: http://localhost:8081,http://127.0.0.1:8081
      - key: H3_RESOLUTION
        value: 9
      - key: DATABASE_URL
        fromDatabase:
          name: icross-db
          property: connectionString
      - key: PG_DATABASE_URL
        fromDatabase:
          name: icross-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: icross-redis
          property: connectionString
    disk:
      name: uploads
      mountPath: uploads
      sizeGB: 1

databases:
  - name: icross-db
    plan: free
    databaseType: postgresql
    version: 16

redis:
  - name: icross-redis
    plan: free
    maxmemoryPolicy: noeviction
